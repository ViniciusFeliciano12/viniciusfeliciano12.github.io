<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Mestre — Aurores</title>
  <link rel="stylesheet" href="../css/base.css?v=202607122000">
  <link rel="stylesheet" href="../css/painel.css?v=202607122000">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js?v=202607122000"></script>
  <script src="../js/db.js?v=202607122000"></script>
  <script src="../js/header.js?v=202607122000" data-page="painel"></script>
</head>

<body>

  <!-- TOPBAR -->
  <div class="app-topbar">
    <div class="page-nav"></div>
    <div class="user-bar" id="user-bar" style="display:none"></div>
  </div>

  <!-- LOADING -->
  <div class="painel-loading-msg" id="painel-loading">Verificando sessão…</div>

  <!-- CONTENT -->
  <div class="painel-main" id="painel-content" style="display:none">
    <h1 class="painel-title">Jogadores Registrados</h1>
    <p class="painel-sub">Selecione um jogador para visualizar e editar suas fichas.</p>
    <div class="players-grid" id="players-grid"></div>
    <p class="painel-empty" id="empty-msg" style="display:none">
      Nenhum jogador registrado ainda.<br>
      Os jogadores aparecem aqui após o primeiro login no sistema.
    </p>
  </div>

  <!-- ERROR -->
  <div class="painel-error-box" id="painel-error">
    <p class="painel-error-msg" id="error-msg"></p>
    <a class="painel-error-link" href="../ficha/">← Voltar para Fichas</a>
  </div>

  <script src="../js/painel.js?v=202607122000"></script>

</body>

</html>
