<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Mestre — Aurores</title>
  <link rel="stylesheet" href="../css/base.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/db.js"></script>
  <style>
    .painel-main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem;
    }
    .painel-title {
      color: var(--gold-lt);
      font-size: 1.5rem;
      margin-bottom: .4rem;
    }
    .painel-sub {
      color: var(--parch-alt);
      font-size: .9rem;
      margin-bottom: 2rem;
    }
    .players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1rem;
    }
    .player-card {
      background: var(--parch);
      border: 1px solid var(--parch-deep);
      border-radius: var(--r);
      padding: 1.4rem 1.2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .8rem;
      text-align: center;
      transition: transform .15s, box-shadow .15s;
    }
    .player-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,.35);
    }
    .player-card.is-self {
      border-color: rgba(184,136,10,.5);
    }
    .player-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--parch);
      font-size: 1.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .player-card.is-self .player-avatar {
      background: var(--crimson);
    }
    .player-name {
      display: block;
      color: var(--ink);
      font-size: .92rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .player-email {
      display: block;
      color: var(--ink-soft);
      font-size: .78rem;
      word-break: break-all;
      line-height: 1.4;
      margin-top: .15rem;
    }
    .player-you {
      display: block;
      color: var(--ink-soft);
      font-size: .75rem;
      margin-top: .1rem;
    }
    .btn-ver-fichas {
      display: inline-block;
      background: var(--gold);
      color: var(--ink);
      text-decoration: none;
      padding: .45rem 1.2rem;
      border-radius: var(--r);
      font-size: .85rem;
      font-weight: 600;
      transition: background .15s;
      width: 100%;
      text-align: center;
    }
    .btn-ver-fichas:hover {
      background: var(--gold-lt);
    }
    .painel-empty {
      color: var(--parch-alt);
      text-align: center;
      padding: 3rem 1rem;
      font-style: italic;
    }
    .painel-loading-msg {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      color: var(--parch);
      font-size: 1.05rem;
    }
    .painel-error-box {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1rem;
    }
    .painel-error-msg {
      color: var(--crimson-lt);
      font-size: 1.05rem;
    }
    .painel-error-link {
      color: var(--gold);
      text-decoration: underline;
    }
    .topbar-title {
      padding: 0 18px;
      font-size: .78rem;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--gold);
      font-weight: 600;
      display: flex;
      align-items: center;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <!-- TOPBAR -->
  <div class="app-topbar">
    <div class="page-nav">
      <span class="topbar-title">⚡ Painel do Mestre</span>
    </div>
    <div style="flex:1"></div>
    <div class="user-bar" id="user-bar" style="display:none">
      <div class="user-avatar-mini" id="user-avatar-mini"></div>
      <span class="user-email" id="user-email-display"></span>
      <span class="gm-badge">Mestre</span>
      <a class="btn-painel" href="../perfil/" style="display:inline-flex;">Perfil</a>
      <button class="btn-logout" onclick="painelLogout()">Sair</button>
    </div>
  </div>

  <!-- LOADING -->
  <div class="painel-loading-msg" id="painel-loading">Verificando sessão…</div>

  <!-- CONTENT -->
  <div class="painel-main" id="painel-content" style="display:none">
    <h1 class="painel-title">Jogadores Registrados</h1>
    <p class="painel-sub">Selecione um jogador para visualizar e editar suas fichas.</p>
    <div class="players-grid" id="players-grid"></div>
    <p class="painel-empty" id="empty-msg" style="display:none">
      Nenhum jogador registrado ainda.<br>
      Os jogadores aparecem aqui após o primeiro login no sistema.
    </p>
  </div>

  <!-- ERROR -->
  <div class="painel-error-box" id="painel-error">
    <p class="painel-error-msg" id="error-msg"></p>
    <a class="painel-error-link" href="../ficha/">← Voltar para Fichas</a>
  </div>

  <script>
    async function initPainel() {
      if (typeof dbConfigured === 'undefined' || !dbConfigured()) {
        _showError('Firebase não configurado.');
        return;
      }
      try {
        const user = await dbInit();
        if (!user) { window.location.href = '../ficha/'; return; }
        if (!DB_IS_GM) { window.location.href = '../ficha/'; return; }

        document.getElementById('painel-loading').style.display = 'none';
        document.getElementById('painel-content').style.display = 'block';
        const bar = document.getElementById('user-bar');
        bar.style.display = 'flex';
        const perfilDM = await dbGetUser(user.uid).catch(() => null);
        document.getElementById('user-email-display').textContent = perfilDM?.username || user.email;
        const avatarMiniDM = document.getElementById('user-avatar-mini');
        if (avatarMiniDM) {
          if (perfilDM?.avatarUrl) {
            avatarMiniDM.innerHTML = '<img src="' + perfilDM.avatarUrl + '" alt="">';
          } else {
            avatarMiniDM.textContent = (perfilDM?.username || user.email || '?')[0].toUpperCase();
          }
        }

        await _carregarJogadores();
      } catch (e) {
        _showError('Erro ao carregar painel: ' + e.message);
      }
    }

    async function _carregarJogadores() {
      let users;
      try {
        users = await dbListUsers();
      } catch (e) {
        _showError('Erro ao listar jogadores: ' + e.message);
        return;
      }

      const grid = document.getElementById('players-grid');

      if (!users.length) {
        document.getElementById('empty-msg').style.display = 'block';
        return;
      }

      users.forEach(u => {
        const isSelf = u.uid === DB_USER.uid;
        const card = document.createElement('div');
        card.className = 'player-card' + (isSelf ? ' is-self' : '');

        const nomeDisplay = u.username || u.email;
        const avatarHtml = u.avatarUrl
          ? '<img src="' + u.avatarUrl + '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" alt="">'
          : nomeDisplay[0].toUpperCase();

        card.innerHTML =
          '<div class="player-avatar">' + avatarHtml + '</div>' +
          '<div style="text-align:center;width:100%;">' +
            '<span class="player-name">' + _escapeHtml(nomeDisplay) + '</span>' +
            (isSelf ? '<span class="player-you">suas fichas</span>' : '') +
          '</div>' +
          '<a class="btn-ver-fichas" href="../ficha/?jogador=' + encodeURIComponent(u.uid) + '">Ver fichas →</a>';
        grid.appendChild(card);
      });
    }

    async function painelLogout() {
      await dbLogout();
      window.location.href = '../ficha/';
    }

    function _showError(msg) {
      document.getElementById('painel-loading').style.display = 'none';
      document.getElementById('painel-content').style.display = 'none';
      const errEl = document.getElementById('painel-error');
      errEl.style.display = 'flex';
      document.getElementById('error-msg').textContent = msg;
    }

    function _escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    initPainel();
  </script>

</body>
</html>
